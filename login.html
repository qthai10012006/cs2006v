<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3T Cinema – Đăng nhập</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07060e; --surface: #110f1e; --surface2: #1a1830;
      --gold: #f0c040; --gold-dim: #a8862a; --red: #e84545;
      --green: #2ecc71; --text: #f0edf7; --muted: #7c7a90;
      --border: rgba(240,192,64,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(240,192,64,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 80% 100%, rgba(232,69,69,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .back-link {
      position: fixed; top: 24px; left: 32px;
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none; font-size: .8rem;
      font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
      transition: color .25s; z-index: 10;
    }
    .back-link:hover { color: var(--gold); }
    .page-logo {
      font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
      letter-spacing: 4px; color: var(--gold); text-align: center;
      margin-bottom: 28px; position: relative; z-index: 1;
    }
    .page-logo span { color: var(--text); opacity: .7; }
    .card {
      position: relative; z-index: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      width: 100%; max-width: 440px; padding: 40px 38px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      animation: cardUp .35s cubic-bezier(.22,1,.36,1);
      max-height: 95vh; overflow-y: auto; margin: 80px 16px 24px;
    }
    @keyframes cardUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-title {
      font-family: 'Bebas Neue', cursive; font-size: 2.2rem;
      letter-spacing: 3px; margin-bottom: 5px;
    }
    .card-subtitle { font-size: .82rem; color: var(--muted); margin-bottom: 26px; }
    .card-subtitle a { color: var(--gold); cursor: pointer; text-decoration: none; }
    .card-subtitle a:hover { text-decoration: underline; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: .72rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      padding: 11px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(240,192,64,0.1); }
    .form-group input::placeholder { color: var(--muted); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-error { font-size: .72rem; color: var(--red); margin-top: 4px; min-height: 14px; display: none; }
    .form-global-error {
      background: rgba(232,69,69,0.1); border: 1px solid rgba(232,69,69,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: .82rem;
      color: var(--red); margin-bottom: 14px; display: none;
    }
    .form-success {
      background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: .82rem;
      color: var(--green); margin-bottom: 14px; display: none;
    }
    .btn-submit {
      width: 100%; background: var(--gold); border: none; color: #000;
      padding: 13px 0; font-family: 'DM Sans', sans-serif;
      font-size: .88rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; border-radius: 8px; cursor: pointer;
      margin-top: 6px; transition: opacity .2s, transform .15s;
    }
    .btn-submit:hover { opacity: .88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .card-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0; color: var(--muted); font-size: .75rem;
    }
    .card-divider::before, .card-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .forgot-link { text-align: center; font-size: .8rem; color: var(--muted); }
    .forgot-link a { color: var(--gold); cursor: pointer; }
    .forgot-link a:hover { text-decoration: underline; }
    .password-wrap { position: relative; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .72rem; letter-spacing: 1px; text-transform: uppercase; padding: 4px;
    }
    .toggle-pw:hover { color: var(--text); }
    .strength-meter { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-top: 7px; }
    .strength-bar { height: 3px; border-radius:  2px; background: rgba(255,255,255,0.1); transition: background .3s; }
    #panelLogin, #panelRegister { display: none; }
    #panelLogin.active, #panelRegister.active { display: block; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← Về trang chủ</a>
  <div class="page-logo">🎬 3T<span>Cinema</span></div>
  <div class="card">

    <!-- LOGIN -->
    <div id="panelLogin">
      <div class="card-title">Đăng Nhập</div>
      <div class="card-subtitle">
        Chưa có tài khoản? <a onclick="switchPanel('register')">Tạo ngay miễn phí</a>
      </div>
      <div class="form-global-error" id="loginError"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="example@email.com"/>
        <div class="form-error" id="loginEmailErr"></div>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="loginPass" placeholder="Nhập mật khẩu" style="padding-right:60px"/>
          <button class="toggle-pw" onclick="togglePw('loginPass',this)">Hiện</button>
        </div>
        <div class="form-error" id="loginPassErr"></div>
      </div>
      <button class="btn-submit" onclick="doLogin()">Đăng nhập →</button>
      <div class="card-divider">hoặc</div>
      <div class="forgot-link">Quên mật khẩu? <a>Khôi phục tại đây</a></div>
    </div>

    <!-- REGISTER -->
    <div id="panelRegister">
      <div class="card-title">Tạo Tài Khoản</div>
      <div class="card-subtitle">
        Đã có tài khoản? <a onclick="switchPanel('login')">Đăng nhập</a>
      </div>
      <div class="form-global-error" id="registerError"></div>
      <div class="form-success" id="registerSuccess"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Họ</label>
          <input type="text" id="regLast" placeholder="Nguyễn"/>
          <div class="form-error" id="regLastErr"></div>
        </div>
        <div class="form-group">
          <label>Tên</label>
          <input type="text" id="regFirst" placeholder="An"/>
          <div class="form-error" id="regFirstErr"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="example@email.com"/>
        <div class="form-error" id="regEmailErr"></div>
      </div>
      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="tel" id="regPhone" placeholder="09xxxxxxxx"/>
        <div class="form-error" id="regPhoneErr"></div>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="regPass" placeholder="Tối thiểu 8 ký tự"
                 style="padding-right:60px" oninput="checkStrength(this.value)"/>
          <button class="toggle-pw" onclick="togglePw('regPass',this)">Hiện</button>
        </div>
        <div class="strength-meter">
          <div class="strength-bar" id="sb1"></div><div class="strength-bar" id="sb2"></div>
          <div class="strength-bar" id="sb3"></div><div class="strength-bar" id="sb4"></div>
        </div>
        <div class="form-error" id="regPassErr"></div>
      </div>
      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <div class="password-wrap">
          <input type="password" id="regPass2" placeholder="Nhập lại mật khẩu" style="padding-right:60px"/>
          <button class="toggle-pw" onclick="togglePw('regPass2',this)">Hiện</button>
        </div>
        <div class="form-error" id="regPass2Err"></div>
      </div>
      <button class="btn-submit" onclick="doRegister()">Tạo tài khoản →</button>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
